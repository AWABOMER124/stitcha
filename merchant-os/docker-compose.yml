services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-wassalk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-waslak_merchant_os}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wassalk} -d ${POSTGRES_DB:-waslak_merchant_os}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── Next.js App ────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL:         postgresql://${POSTGRES_USER:-wassalk}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-waslak_merchant_os}
      AUTH_SECRET:          ${AUTH_SECRET}
      NEXTAUTH_URL:         ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL:  ${NEXT_PUBLIC_APP_URL}
      NODE_ENV:             production
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  db_data:
