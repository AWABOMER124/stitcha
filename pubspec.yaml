name: wassalk_app
description: "A multi-vendor delivery application for Sudan."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^13.1.0

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  
  # Storage & Security
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  
  # Images & Performance
  cached_network_image: ^3.3.1
  
  # Real-time & Notifications
  web_socket_channel: ^3.0.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Maps
  google_maps_flutter: ^2.9.0

  # Debugging & Logging
  logger: ^2.0.2
  
  # Data Classes & JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Theming & Fonts
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: 6.9.5

flutter:
  uses-material-design: true
  generate: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
